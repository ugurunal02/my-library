<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genel Bakış — Kütüphanem</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav id="nav"></nav>
<main>
  <div class="page-header">
    <div>
      <h1 class="page-title">Genel Bakış</h1>
      <p class="page-sub" id="welcome-sub">Koleksiyonunuzun özeti</p>
    </div>
    <span id="last-updated" style="font-size:12px;color:var(--muted);"></span>
  </div>

  <!-- Stat cards -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px;">
    <div class="stat-card">
      <span class="stat-label">Toplam Kitap</span>
      <span class="stat-value" id="stat-total">—</span>
      <span class="stat-sub">koleksiyonda</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Yayınevi Sayısı</span>
      <span class="stat-value" id="stat-publishers" style="color:var(--teal);">—</span>
      <span class="stat-sub">farklı yayınevi</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Yazar Sayısı</span>
      <span class="stat-value" id="stat-authors" style="color:var(--purple);">—</span>
      <span class="stat-sub">farklı yazar</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Okunan Kitap</span>
      <span class="stat-value" id="stat-read" style="color:var(--accent2);">—</span>
      <span class="stat-sub">okundu kaydedildi</span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
    <!-- Top Publishers -->
    <div class="card">
      <h3 style="font-size:17px;margin-bottom:20px;">En Çok Kitabı Olan Yayınevleri</h3>
      <div id="pub-chart"><div style="color:var(--muted);font-size:14px;">Yükleniyor...</div></div>
    </div>

    <!-- Top Authors -->
    <div class="card">
      <h3 style="font-size:17px;margin-bottom:20px;">En Çok Kitabı Olan Yazarlar</h3>
      <div id="auth-chart"><div style="color:var(--muted);font-size:14px;">Yükleniyor...</div></div>
    </div>
  </div>

  <!-- Recent reads -->
  <div class="card">
    <h3 style="font-size:17px;margin-bottom:20px;">Son Okunanlar</h3>
    <div id="recent-reads"><div style="color:var(--muted);font-size:14px;">Yükleniyor...</div></div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
async function onAuthReady(userData) {
  document.getElementById('welcome-sub').textContent = `Hoş geldin, ${userData.name}!`;
  document.getElementById('last-updated').textContent = 'Son güncelleme: ' + new Date().toLocaleString('tr-TR');
  await loadDashboard();
}

async function loadDashboard() {
  const snap = await db.collection('books').get();
  const books = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Stats
  document.getElementById('stat-total').textContent = books.length;

  const publishers = {};
  const authors = {};
  let readCount = 0;

  books.forEach(b => {
    if (b.publisher) publishers[b.publisher] = (publishers[b.publisher] || 0) + 1;
    if (b.author) authors[b.author] = (authors[b.author] || 0) + 1;
    if (b.readBy && b.readBy.length > 0) readCount++;
  });

  document.getElementById('stat-publishers').textContent = Object.keys(publishers).length;
  document.getElementById('stat-authors').textContent = Object.keys(authors).length;
  document.getElementById('stat-read').textContent = readCount;

  // Top publishers bar chart
  renderBarChart('pub-chart', publishers, '#3ecfb2', 10);

  // Top authors bar chart
  renderBarChart('auth-chart', authors, '#8b6ff0', 10);

  // Recent reads
  const readBooks = books.filter(b => b.readBy && b.readBy.length > 0)
    .sort((a, b) => (b.readAt?.seconds || 0) - (a.readAt?.seconds || 0))
    .slice(0, 6);

  const rr = document.getElementById('recent-reads');
  if (readBooks.length === 0) {
    rr.innerHTML = '<div class="empty"><div class="empty-icon">📖</div><p>Henüz okuma kaydı yok.</p></div>';
    return;
  }
  rr.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;">
      ${readBooks.map(b => `
        <div style="display:flex;gap:12px;padding:14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);">
          <div style="width:40px;height:56px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">📗</div>
          <div style="min-width:0;">
            <div style="font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.title}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px;">${b.author || '—'}</div>
            <div style="margin-top:6px;">
              ${(b.readBy || []).map(r => `<span class="badge badge-read" style="margin-right:4px;">${r}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderBarChart(containerId, dataObj, color, topN) {
  const sorted = Object.entries(dataObj).sort((a,b) => b[1]-a[1]).slice(0, topN);
  const max = sorted[0]?.[1] || 1;
  const el = document.getElementById(containerId);
  if (sorted.length === 0) { el.innerHTML = '<div style="color:var(--muted);font-size:14px;">Veri yok.</div>'; return; }
  el.innerHTML = sorted.map(([name, count]) => `
    <div class="bar-row">
      <div class="bar-label" title="${name}">${name}</div>
      <div class="bar-track"><div class="bar-fill" data-w="${Math.round(count/max*100)}" style="background:${color};width:0%"></div></div>
      <div class="bar-count">${count}</div>
    </div>
  `).join('');
  // Animate after render
  requestAnimationFrame(() => {
    el.querySelectorAll('.bar-fill').forEach(el => el.style.width = el.dataset.w + '%');
  });
}
</script>
</body>
</html>
