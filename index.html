<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Kütüphanem</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-base-200 min-h-screen">

    <div class="navbar bg-primary text-primary-content shadow-lg px-4 md:px-12">
        <div class="flex-1">
            <a class="btn btn-ghost text-xl font-bold uppercase tracking-widest">Kütüphanem</a>
        </div>
        <div class="flex-none gap-2">
            <div id="adminStatus" class="hidden flex items-center gap-2">
                <span class="badge badge-success font-bold">Yönetici Girişi Yapıldı</span>
                <button onclick="logout()" class="btn btn-sm btn-outline btn-content">Çıkış Yap</button>
            </div>
            <button id="loginBtn" onclick="showLoginModal()" class="btn btn-sm btn-ghost">Admin Girişi</button>
        </div>
    </div>

    <div class="container mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="stat bg-white rounded-box shadow">
                <div class="stat-title text-gray-500 uppercase">Toplam Kitap</div>
                <div id="statTotal" class="stat-value text-primary">0</div>
            </div>
            <div class="stat bg-white rounded-box shadow">
                <div class="stat-title text-gray-500 uppercase">En Çok Kitap (Yazar)</div>
                <div id="statTopAuthor" class="text-sm font-bold truncate text-secondary">...</div>
            </div>
            <div class="stat bg-white rounded-box shadow">
                <div class="stat-title text-gray-500 uppercase">En Çok Kitap (Yayınevi)</div>
                <div id="statTopPub" class="text-sm font-bold truncate text-secondary">...</div>
            </div>
            <div class="stat bg-white rounded-box shadow">
                <div class="stat-title text-gray-500 uppercase">Okuyanlar Verisi</div>
                <div id="statBorrowed" class="text-[10px] font-semibold overflow-y-auto max-h-12">...</div>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/4 bg-white p-6 rounded-box shadow-sm h-fit">
                <h3 class="font-bold mb-4 flex items-center gap-2 border-b pb-2">🔍 Arama & Filtre</h3>
                <input type="text" id="searchInput" placeholder="Kitap veya Yazar Ara..." class="input input-bordered w-full mb-4" onkeyup="filterBooks()" />
                
                <label class="label text-xs font-bold opacity-50 uppercase">Yayınevi</label>
                <select id="pubFilter" class="select select-bordered w-full mb-4 select-sm" onchange="filterBooks()">
                    <option value="">Tüm Yayınevleri</option>
                </select>

                <label class="label text-xs font-bold opacity-50 uppercase">Okuyan Kişi</label>
                <select id="readerFilter" class="select select-bordered w-full mb-4 select-sm" onchange="filterBooks()">
                    <option value="">Tüm Okuyanlar</option>
                </select>

                <div id="adminPanel" class="hidden mt-8 p-4 border-2 border-dashed border-primary rounded-lg bg-primary/5">
                    <h4 class="font-bold text-primary mb-2 text-center">Toplu Kitap Yükleme</h4>
                    <p class="text-[10px] mb-4 text-center opacity-70">Excel başlıkları: ISBN, Kitap Adı, Yazar, Yayınevi, Okuyan</p>
                    <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls" onchange="handleExcel(event)" />
                    <button onclick="document.getElementById('excelInput').click()" class="btn btn-primary btn-sm w-full">EXCEL DOSYASI SEÇ</button>
                    <div id="uploadProgress" class="mt-4 text-center text-xs font-bold text-secondary"></div>
                </div>
            </div>

            <div class="w-full lg:w-3/4">
                <div id="bookList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-20 opacity-50">Kütüphane rafları yükleniyor, lütfen bekleyin...</div>
                </div>
            </div>
        </div>
    </div>

    <dialog id="login_modal" class="modal">
        <div class="modal-box">
            <h3 class="font-bold text-lg">Admin Paneline Giriş</h3>
            <div class="py-4 space-y-4">
                <input type="email" id="loginEmail" placeholder="E-posta" class="input input-bordered w-full" />
                <input type="password" id="loginPass" placeholder="Şifre" class="input input-bordered w-full" />
            </div>
            <div class="modal-action">
                <button class="btn btn-primary w-full" onclick="login()">Sisteme Gir</button>
            </div>
        </div>
    </dialog>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCzFiK-_AzAOWq9Ffm2rXMAXI48GZJtsWI",
            authDomain: "mylibrary-1d84a.firebaseapp.com",
            projectId: "mylibrary-1d84a",
            storageBucket: "mylibrary-1d84a.firebasestorage.app",
            messagingSenderId: "1030099014949",
            appId: "1:1030099014949:web:0a3a379d2d5aaa703f36cc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let allBooks = [];

        async function fetchBooks() {
            try {
                const q = query(collection(db, "books"), orderBy("title", "asc"));
                const querySnapshot = await getDocs(q);
                allBooks = [];
                querySnapshot.forEach((doc) => allBooks.push({ id: doc.id, ...doc.data() }));
                renderBooks(allBooks);
                updateStats();
                fillFilters();
            } catch (e) {
                console.error("Veri hatası:", e);
                document.getElementById('bookList').innerHTML = "Veritabanı boş veya bağlantı hatası var.";
            }
        }

        function renderBooks(data) {
            const list = document.getElementById('bookList');
            if(data.length === 0) { list.innerHTML = "Görüntülenecek kitap bulunamadı."; return; }
            list.innerHTML = data.map(book => `
                <div class="card bg-white shadow-sm hover:shadow-md border border-base-300 transition-all">
                    <div class="card-body p-4">
                        <h2 class="card-title text-sm font-bold text-primary uppercase leading-tight">${book.title}</h2>
                        <p class="text-xs font-semibold opacity-70">👤 ${book.author}</p>
                        <div class="mt-2">
                             <span class="badge badge-outline badge-xs opacity-50 uppercase font-bold">${book.publisher}</span>
                        </div>
                        <div class="mt-4 flex flex-wrap gap-1">
                            ${book.readers && book.readers.length > 0 ? 
                              book.readers.map(r => `<span class="badge badge-secondary badge-xs px-2 py-2 font-bold">${r}</span>`).join('') : 
                              '<span class="text-[10px] italic opacity-30">Okunmadı</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = allBooks.length;
            const authors = {}, pubs = {}, readersCount = {};
            allBooks.forEach(b => {
                if(b.author) authors[b.author] = (authors[b.author] || 0) + 1;
                if(b.publisher) pubs[b.publisher] = (pubs[b.publisher] || 0) + 1;
                (b.readers || []).forEach(r => readersCount[r] = (readersCount[r] || 0) + 1);
            });
            const topAuthor = Object.entries(authors).sort((a,b) => b[1]-a[1])[0];
            const topPub = Object.entries(pubs).sort((a,b) => b[1]-a[1])[0];
            
            document.getElementById('statTopAuthor').innerText = topAuthor ? `${topAuthor[0]} (${topAuthor[1]})` : '-';
            document.getElementById('statTopPub').innerText = topPub ? `${topPub[0]} (${topPub[1]})` : '-';
            document.getElementById('statBorrowed').innerText = Object.entries(readersCount).map(e => `${e[0]}: ${e[1]}`).join(' | ');
        }

        function fillFilters() {
            const pSel = document.getElementById('pubFilter'), rSel = document.getElementById('readerFilter');
            const pUnique = [...new Set(allBooks.map(b => b.publisher).filter(Boolean))].sort();
            const rUnique = [...new Set(allBooks.flatMap(b => b.readers || []).filter(Boolean))].sort();
            pSel.innerHTML = '<option value="">Tüm Yayınevleri</option>' + pUnique.map(p => `<option value="${p}">${p}</option>`).join('');
            rSel.innerHTML = '<option value="">Tüm Okuyanlar</option>' + rUnique.map(r => `<option value="${r}">${r}</option>`).join('');
        }

        window.filterBooks = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const p = document.getElementById('pubFilter').value;
            const r = document.getElementById('readerFilter').value;
            const filtered = allBooks.filter(b => {
                const mS = (b.title || "").toLowerCase().includes(s) || (b.author || "").toLowerCase().includes(s);
                const mP = p === "" || b.publisher === p;
                const mR = r === "" || (b.readers && b.readers.includes(r));
                return mS && mP && mR;
            });
            renderBooks(filtered);
        }

        window.handleExcel = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            const progress = document.getElementById('uploadProgress');
            
            reader.onload = async (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);

                    progress.innerText = "Yükleme Başlatılıyor...";

                    for (let i = 0; i < json.length; i++) {
                        const row = json[i];
                        const okuyan = row["Okuyan"] || "";
                        const readersArr = okuyan ? okuyan.toString().split(',').map(s => s.trim()) : [];

                        await addDoc(collection(db, "books"), {
                            isbn: row["ISBN"] ? row["ISBN"].toString() : "",
                            title: row["Kitap Adı"] || "İsimsiz Kitap",
                            author: row["Yazar"] || "Bilinmeyen Yazar",
                            publisher: row["Yayınevi"] || "Bilinmeyen Yayınevi",
                            readers: readersArr
                        });

                        progress.innerText = `İşleniyor: ${i+1} / ${json.length} Kitap`;
                    }
                    alert("Tüm kitaplar başarıyla yüklendi!");
                    location.reload();
                } catch (err) {
                    alert("Yükleme sırasında hata: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        window.showLoginModal = () => document.getElementById('login_modal').showModal();
        window.login = async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value);
                document.getElementById('login_modal').close();
            } catch (e) { alert("Hatalı e-posta veya şifre!"); }
        };
        window.logout = () => signOut(auth);
        onAuthStateChanged(auth, u => {
            const adminP = document.getElementById('adminPanel'), status = document.getElementById('adminStatus'), btn = document.getElementById('loginBtn');
            if(u) { adminP.classList.remove('hidden'); status.classList.remove('hidden'); btn.classList.add('hidden'); }
            else { adminP.classList.add('hidden'); status.classList.add('hidden'); btn.classList.remove('hidden'); }
        });
        fetchBooks();
    </script>
</body>
</html>
